<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CRM Gami Gomitas</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <img class="brand-logo" src="IMG_8867.PNG" alt="MiMar Alimentos" />
      </div>
      <div class="user-area" id="userArea">
        <span class="user-email" id="userEmail"></span>
        <button class="btn ghost" id="logoutBtn">Salir</button>
      </div>
    </header>

    <main>
      <section class="auth" id="authSection">
        <div class="card auth-card">
          <h1>Ingresar</h1>
          <p class="muted">Accede con tu usuario y contrasena.</p>
          <form id="loginForm" class="form-grid">
            <label>
              Correo
              <input type="email" name="email" required autocomplete="email" />
            </label>
            <label>
              contrasena
              <input type="password" name="password" required autocomplete="current-password" />
            </label>
            <button class="btn primary" type="submit">Ingresar</button>
            <button class="btn" type="button" id="registerBtn">Crear cuenta</button>
          </form>
          <div class="error" id="authError"></div>
        </div>
      </section>

      <section class="dashboard" id="dashboardSection">
        <div class="tabs">
          <button class="tab active" data-tab="production">Produccion</button>
          <button class="tab" data-tab="sales">Ventas</button>
        </div>

        <section class="tab-panel active" id="production">
          <div class="grid">
            <div class="card">
              <h2 class="section-title">Produccion de hoy <button class="collapse-toggle" type="button" data-collapse="prodToday" aria-expanded="true"><span class="chevron">&gt;</span></button></h2>
              <div class="collapse-body" id="prodToday">
                <form id="batchForm" class="form-grid">
                <input id="batchProductSelect" name="product" type="hidden" />
                <label>
                  Formula asociada
                  <select name="recipe" required></select>
                </label>
                <div class="muted" id="batchProductInfo"></div>
                <div class="error" id="batchRecipeNotice"></div>
                <label>
                  Fecha (hoy)
                  <input name="date" type="date" required readonly />
                </label>
                <label>
                  Numero de lote
                  <input name="lotNumber" required />
                </label>
                <label>
                  Cantidad fabricada
                  <input name="quantity" type="number" step="0.01" required />
                </label>
                <label>
                  Unidad producida
                  <input id="batchUnit" name="unit" required type="hidden" />
                </label>
                <div class="unit-group" data-target="batchUnit">
                  <button class="btn chip" type="button" data-unit="paquete">paquete</button>
                  <button class="btn chip" type="button" data-unit="caja">caja</button>
                  <button class="btn chip" type="button" data-unit="kg">kg</button>
                  <button class="btn chip" type="button" data-unit="g">g</button>
                  <button class="btn chip" type="button" data-unit="unidad">unidad</button>
                </div>
                <label>
                  Costo total estimado
                  <input name="totalCost" type="number" step="0.01" readonly />
                </label>
                <label>
                  Costo por unidad
                  <input name="unitCost" type="number" step="0.01" readonly />
                </label>
                <button class="btn primary" type="submit">Registrar produccion</button>
                </form>
                <div class="list" id="batchList"></div>
              </div>
            </div>

            <div class="card">
              <h2 class="section-title">Formula de producto <button class="collapse-toggle" type="button" data-collapse="recipeSection" aria-expanded="true"><span class="chevron">&gt;</span></button></h2>
              <div class="collapse-body" id="recipeSection">
                <form id="recipeForm" class="form-grid">
                <label>
                  Nombre del producto
                  <input name="name" required />
                </label>
                <label>
                  Rinde cantidad
                  <input name="yieldQuantity" type="number" step="0.01" required />
                </label>
                <label>
                  Rinde unidad (paquete, kg)
                  <input id="recipeYieldUnit" name="yieldUnit" required type="hidden" />
                </label>
                <div class="unit-group" data-target="recipeYieldUnit">
                  <button class="btn chip" type="button" data-unit="paquete">paquete</button>
                  <button class="btn chip" type="button" data-unit="caja">caja</button>
                  <button class="btn chip" type="button" data-unit="kg">kg</button>
                  <button class="btn chip" type="button" data-unit="g">g</button>
                  <button class="btn chip" type="button" data-unit="unidad">unidad</button>
                </div>
                <div class="ingredient-builder">
                  <label>
                    Materia prima
                    <select name="material"></select>
                  </label>
                  <label>
                    Cantidad usada
                    <input name="quantity" type="number" step="0.01" />
                  </label>
                  <label>
                    Unidad
                    <input id="recipeIngredientUnit" name="unit" type="hidden" />
                  </label>
                  <div class="unit-group" data-target="recipeIngredientUnit">
                    <button class="btn chip" type="button" data-unit="kg">kg</button>
                    <button class="btn chip" type="button" data-unit="g">g</button>
                    <button class="btn chip" type="button" data-unit="L">L</button>
                    <button class="btn chip" type="button" data-unit="ml">ml</button>
                    <button class="btn chip" type="button" data-unit="unidad">unidad</button>
                  </div>
                  <label>
                    Costo unitario (precio actual)
                    <input name="unitCost" type="number" step="0.01" readonly />
                  </label>
                  <button class="btn" type="button" id="addIngredientBtn">Agregar materia prima</button>
                </div>
                <div class="list" id="recipeIngredientsList"></div>
                <div class="ingredient-builder">
                  <label>
                    Display (fijo)
                    <input name="displayWeight" type="text" value="360 g" readonly />
                  </label>
                  <label>
                    Costo caja de carton
                    <input name="boxCost" type="number" step="1" />
                  </label>
                  <label>
                    Costo empaque unitario
                    <input name="wrapCost" type="number" step="1" />
                  </label>
                  <label>
                    Cantidad de empaques por display
                    <input name="wrapCount" type="number" step="1" value="12" />
                  </label>
                </div>
                <div class="list" id="recipeCostPreview"></div>
                <button class="btn primary" type="submit">Guardar formula</button>
                </form>
                <div class="list" id="recipeList"></div>
              </div>
            </div>

            <div class="card">
              <h2 class="section-title">Materias primas <button class="collapse-toggle" type="button" data-collapse="rawMaterialSection" aria-expanded="true"><span class="chevron">&gt;</span></button></h2>
              <div class="collapse-body" id="rawMaterialSection">
                <form id="rawMaterialForm" class="form-grid">
                <label>
                  Nombre
                  <input name="name" required />
                </label>
                <label>
                  Unidad (kg, g, L)
                  <input id="rawMaterialUnit" name="unit" required type="hidden" />
                </label>
                <div class="unit-group" data-target="rawMaterialUnit">
                  <button class="btn chip" type="button" data-unit="kg">kg</button>
                  <button class="btn chip" type="button" data-unit="g">g</button>
                  <button class="btn chip" type="button" data-unit="L">L</button>
                  <button class="btn chip" type="button" data-unit="ml">ml</button>
                  <button class="btn chip" type="button" data-unit="unidad">unidad</button>
                </div>
                <label>
                  Costo de referencia (por unidad base)
                  <input name="referenceCost" type="number" step="0.01" />
                </label>
                <label>
                  Stock minimo (opcional)
                  <input name="minStock" type="number" step="0.01" />
                </label>
                <input name="referenceQuantity" type="hidden" value="1" />
                <input name="legacyReferenceQuantity" type="hidden" />
                <input name="legacyReferenceCostTotal" type="hidden" />
                <label>
                  Proveedor (opcional)
                  <input name="supplier" />
                </label>
                <button class="btn primary" type="submit">Guardar materia prima</button>
                </form>
                <div class="list" id="rawMaterialList"></div>
              </div>
            </div>

            <div class="card">
              <h2 class="section-title">Stock de materias primas <button class="collapse-toggle" type="button" data-collapse="stockSection" aria-expanded="true"><span class="chevron">&gt;</span></button></h2>
              <div class="collapse-body" id="stockSection">
                <form id="purchaseForm" class="form-grid">
                <label>
                  Materia prima
                  <select name="material" required></select>
                </label>
                <label>
                  Fecha
                  <input name="date" type="date" required />
                </label>
                <label>
                  Cantidad ingresada
                  <input name="quantity" type="number" step="0.01" required />
                </label>
                <label>
                  Unidad de ingreso
                  <input id="purchaseUnit" name="purchaseUnit" required type="hidden" />
                </label>
                <div class="unit-group" data-target="purchaseUnit">
                  <button class="btn chip" type="button" data-unit="kg">kg</button>
                  <button class="btn chip" type="button" data-unit="g">g</button>
                  <button class="btn chip" type="button" data-unit="L">L</button>
                  <button class="btn chip" type="button" data-unit="ml">ml</button>
                  <button class="btn chip" type="button" data-unit="unidad">unidad</button>
                </div>
                <label>
                  Costo por esa cantidad
                  <input name="totalCost" type="number" step="0.01" required />
                </label>
                <label>
                  Costo unitario base
                  <input name="unitPrice" type="number" step="0.01" readonly />
                </label>
                <button class="btn primary" type="submit">Registrar ingreso</button>
                </form>
                <div class="section-subtitle">Movimientos recientes</div>
                <div class="list" id="purchaseList"></div>
              </div>
            </div>

            <div class="card">
              <h2 class="section-title">Resumen de stock (estimado) <button class="collapse-toggle" type="button" data-collapse="stockSummarySection" aria-expanded="true"><span class="chevron">&gt;</span></button></h2>
              <div class="collapse-body" id="stockSummarySection">
                <div class="form-grid">
                  <label>
                    Formula para calculo de produccion
                    <select id="stockRecipeSelect"></select>
                  </label>
                </div>
                <div class="summary-block">
                  <h3 class="section-subtitle">Resumen general</h3>
                  <div class="summary-card" id="stockSummaryGeneral"></div>
                </div>
                <div class="summary-block">
                  <h3 class="section-subtitle">Materias primas</h3>
                  <div class="materials-table" id="stockMaterialsList"></div>
                </div>
                <div class="summary-block">
                  <h3 class="section-subtitle">Produccion realizada</h3>
                  <div class="summary-card" id="stockProductionSummary"></div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="tab-panel" id="sales">
          <div class="grid">
            <div class="card">
              <h2>Productos</h2>
              <form id="productForm" class="form-grid">
                <label>
                  Nombre
                  <input name="name" required />
                </label>
                <label>
                  Unidad (paquete, caja)
                  <input name="unit" required />
                </label>
                <label>
                  Precio sugerido
                  <input name="price" type="number" step="0.01" required />
                </label>
                <button class="btn primary" type="submit">Guardar producto</button>
              </form>
              <div class="list" id="productList"></div>
            </div>

            <div class="card">
              <h2>Clientes</h2>
              <form id="clientForm" class="form-grid">
                <label>
                  Nombre
                  <input name="name" required />
                </label>
                <label>
                  Telefono
                  <input name="phone" />
                </label>
                <label>
                  Direccion
                  <input name="address" />
                </label>
                <button class="btn primary" type="submit">Guardar cliente</button>
              </form>
              <div class="list" id="clientList"></div>
            </div>

            <div class="card">
              <h2>Ventas</h2>
              <form id="saleForm" class="form-grid">
                <label>
                  Fecha
                  <input name="date" type="date" required />
                </label>
                <label>
                  Cliente
                  <select name="client"></select>
                </label>
                <label>
                  Producto
                  <select name="product" required></select>
                </label>
                <label>
                  Cantidad
                  <input name="quantity" type="number" step="0.01" required />
                </label>
                <label>
                  Precio unitario
                  <input name="unitPrice" type="number" step="0.01" required />
                </label>
                <label>
                  Metodo de pago
                  <select name="payment" required>
                    <option value="Efectivo">Efectivo</option>
                    <option value="Transferencia">Transferencia</option>
                    <option value="Tarjeta">Tarjeta</option>
                    <option value="Credito">Credito</option>
                  </select>
                </label>
                <label>
                  Pagado?
                  <select name="paid" required>
                    <option value="si">Si</option>
                    <option value="no">No</option>
                  </select>
                </label>
                <label class="due-date hidden" id="dueDateField">
                  Fecha de cobro
                  <input name="dueDate" type="date" />
                </label>
                <button class="btn primary" type="submit">Registrar venta</button>
              </form>
              <div class="list" id="saleList"></div>
            </div>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
